name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  english-source-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: English-only source guard
        run: bash scripts/check-english-source.sh

  swc-isolation-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: swc isolation guard
        run: bash scripts/check-swc-isolation.sh

  rules-catalog-sync-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rules catalog ↔ site sync guard
        run: bash scripts/check-rules-catalog-sync.sh

  cli-readme-sync-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CLI README ↔ --help sync guard
        run: bash scripts/check-cli-readme-sync.sh

  drift-guards:
    # Two mechanical drift guards. Both need `fetch-depth: 0` (unlike the other guard jobs above,
    # which only read the working tree): the fingerprint guard diffs against the PR base / previous
    # commit, which a shallow (depth-1) checkout would not have fetched.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: parser fingerprint bump guard
        env:
          FINGERPRINT_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('origin/{0}...HEAD', github.base_ref) || 'HEAD~1...HEAD' }}
        run: bash scripts/check-parser-fingerprint-bump.sh
      - name: policy-value census guard
        run: bash scripts/check-policy-census.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  napi-addon-build:
    # Proves the napi addon path (the `addon` feature, default OFF — see packages/napi/Cargo.toml
    # and src/lib.rs's "Feature gating" module doc) actually compiles, since `test` above only
    # builds the workspace with default features. Mirrors prebuild.yml's non-cross
    # x86_64-unknown-linux-gnu matrix entry: ubuntu-latest's host target already *is*
    # x86_64-unknown-linux-gnu, so no --target/cross-linker setup is needed, and (per that
    # workflow's own "Smoke test" step, which also calls `node` with no actions/setup-node step)
    # Node is preinstalled on the runner image. Unlike the Windows (MSVC-only addon) and macOS/
    # cross-linux matrix entries, a full build + smoke run needs no artifacts this runner can't
    # produce, so this job does the real thing instead of falling back to `cargo check`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build napi addon
        run: cargo build -p zzop-napi --features addon
      - name: Smoke test built addon
        run: |
          cp target/debug/libzzop_napi.so packages/napi/zzop-napi.node
          node packages/napi/smoke.mjs
