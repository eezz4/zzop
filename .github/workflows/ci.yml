name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # One job runs every mechanical guard as a named step, instead of one fresh ubuntu runner per
  # guard (the old shape spun up ~15 runners, each doing checkout + a single sub-second shell script).
  # The step NAMES preserve per-guard diagnosability — a failing run still points at the exact guard,
  # same as the local pre-commit hook (which is also fail-fast). Wall-clock does not regress: the guard
  # scripts sum to far less than the `test` job's compile, which stays the critical path; we trade
  # unused per-guard parallelism for ~14 fewer runner spin-ups and one checkout instead of fifteen.
  #
  # Step order MIRRORS `.githooks/pre-commit`'s GUARDS array so CI and the local hook agree. The parser
  # fingerprint-bump guard is the one CI-only addition (the hook omits it — it diffs against a base
  # commit): it runs last and is the sole reason this job needs `fetch-depth: 0` (a strict superset of
  # the shallow checkout the other guards need, which is why the two former drift-guards fold in here).
  #
  # NOTE for maintainers: consolidating renames the required status checks. Any branch-protection rule
  # on `main` listing the old per-guard job names must be updated to `{ guards, test, cli-shim-test }`
  # or the gate silently voids.
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: English-only source guard
        run: bash scripts/check-english-source.sh
      - name: max file lines ratchet guard
        run: bash scripts/check-max-file-lines.sh
      - name: swc isolation guard
        run: bash scripts/check-swc-isolation.sh
      - name: ruff isolation guard
        run: bash scripts/check-ruff-isolation.sh
      - name: syn isolation guard
        run: bash scripts/check-syn-isolation.sh
      - name: tree-sitter isolation guard
        run: bash scripts/check-tree-sitter-isolation.sh
      - name: guards-wired meta-guard
        run: bash scripts/check-guards-wired.sh
      - name: rules catalog ↔ site sync guard
        run: bash scripts/check-rules-catalog-sync.sh
      - name: docs rule-id ↔ catalog sync guard
        run: bash scripts/check-docs-rule-ids.sh
      - name: docs link-graph guard
        run: bash scripts/check-docs-link-graph.sh
      - name: io-key kind-vocabulary sync guard
        run: bash scripts/check-io-key-vocab.sh
      - name: policy-value census guard
        run: bash scripts/check-policy-census.sh
      - name: shell pipe-to-grep-q SIGPIPE seal
        run: bash scripts/check-shell-pipe-sigpipe.sh
      - name: version-string parser-completeness guard
        run: bash scripts/check-version-lists-parsers.sh
      - name: parser fingerprint bump guard
        # CI-only (the pre-commit hook omits it): diffs against the PR base / previous commit, which
        # the `fetch-depth: 0` checkout above is what makes available.
        env:
          FINGERPRINT_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('origin/{0}...HEAD', github.base_ref) || 'HEAD~1...HEAD' }}
        run: bash scripts/check-parser-fingerprint-bump.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  cli-shim-test:
    # Proves the @zzop/cli npm shim actually works against a real native `zzop` binary. Mirrors
    # prebuild.yml's non-cross x86_64-unknown-linux-gnu matrix entry: ubuntu-latest's host target
    # already *is* x86_64-unknown-linux-gnu, so no --target/cross-linker setup is needed, and Node is
    # preinstalled on the runner image.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build native zzop CLI binary
        # @zzop/cli is a zero-logic shim that spawns the native `zzop` binary — its own dev-fallback
        # path resolution only checks a release build (../../target/release/zzop[.exe] relative to
        # packages/cli, no debug fallback), so this needs --release, not a debug build.
        run: cargo build -p zzop-cli-bin --release
      - name: CLI shim tests
        # Glob form (not a bare directory) — `node --test test/` fails on Node v22+ (verified: the
        # bare-directory form throws MODULE_NOT_FOUND on this runner's Node version).
        run: node --test packages/cli/test/*.test.js
