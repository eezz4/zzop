# Prebuild matrix for the N-API addon (napi-rs optionalDependencies pattern — DESIGN.md decision #6).
# On a `v*` tag push, also publishes each platform sub-package and the main @zpz/native package to npm
# via OIDC "trusted publishing" (no NPM_TOKEN secret) — requires each of the 6 packages to have a
# trusted publisher configured on npmjs.com for this repo + this workflow file. See
# packages/napi/README.md's "Publishing" section for the one-time npmjs.com setup.
name: prebuild

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: "true"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compile linker (linux-arm64)
        if: matrix.cross == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - name: Build addon
        run: cargo build -p zpz-napi --release --features addon --target ${{ matrix.target }}
      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release/zpz_napi.dll" "dist/zpz-napi.${{ matrix.target }}.node" ;;
            *apple*)   cp "target/${{ matrix.target }}/release/libzpz_napi.dylib" "dist/zpz-napi.${{ matrix.target }}.node" ;;
            *)         cp "target/${{ matrix.target }}/release/libzpz_napi.so" "dist/zpz-napi.${{ matrix.target }}.node" ;;
          esac
          ls -la dist
      - name: Smoke test (native targets only)
        if: matrix.cross != 'true'
        shell: bash
        run: |
          cp "dist/zpz-napi.${{ matrix.target }}.node" packages/napi/zpz-napi.node
          node packages/napi/smoke.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: zpz-napi-${{ matrix.target }}
          path: dist/*.node

  # Only runs on a `v*` tag push (job-level `if`, since the build matrix above must also run for
  # workflow_dispatch without publishing). The git tag is the single source of truth for the
  # published version: this job overwrites every package.json's committed version with the tag's,
  # so there is no separate "bump packages/napi/package.json before tagging" step to forget.
  #
  # Publishes via npm OIDC "trusted publishing" — no NPM_TOKEN secret. Each of the 6 package names
  # (@zpz/native + the 5 platform sub-packages) must have a trusted publisher configured on
  # npmjs.com pointing at this repo and this workflow file (packages/napi/README.md "Publishing").
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm (OIDC trusted publishing needs a recent npm CLI)
        run: npm install -g npm@latest
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zpz-napi-*
          path: artifacts
          merge-multiple: true
      - name: Set version from tag (overwrites committed version everywhere)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd packages/napi && npm version --no-git-tag-version "$VERSION")
          node packages/napi/scripts/sync-versions.mjs
      - name: Place prebuilt binaries into platform packages
        run: node packages/napi/scripts/place-artifacts.mjs artifacts
      - name: Publish platform packages
        run: |
          for dir in packages/napi/npm/*/; do
            (cd "$dir" && npm publish --provenance)
          done
      - name: Publish main package
        run: (cd packages/napi && npm publish --provenance)
