# Prebuild + release for the Node-free `zzop-mcp` binary. On a `v*` tag push, builds the binary for 5
# platforms and attaches them PLUS per-platform MCPB (`.mcpb`) one-click Desktop bundles to the GitHub
# release. No npm: the npm distribution (JS CLI `@zzop/cli` + napi `@zzop/native`) was removed 2026-07-20
# — Node-free native binary is the single runtime form (see the mcp-distribution decision).
name: prebuild

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # `platform` names the zzop-mcp release asset (and the per-platform `.mcpb`) for each target.
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32-x64-msvc
          # Intel macOS: cross-compiled from the Apple Silicon runner (Intel `macos-13` runners are
          # scarce/deprecated). Same lane as linux-arm64 below — a secondary arch built on the primary
          # runner. The binary depends only on pure-workspace crates, so every cross lane builds with no
          # extra toolchain setup (only linux-arm64 needs a cross-linker, installed below).
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: "true"
            platform: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: "true"
            platform: linux-arm64-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compile linker (linux-arm64)
        # linux-arm64 alone needs a cross-linker; darwin-x64 cross-builds with the universal Apple SDK
        # on the arm64 runner and needs none.
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - name: Build zzop-mcp binary
        # On a `v*` tag, stamp the binary's reported version (MCP serverInfo.version, compile-time
        # `ZZOP_RELEASE_VERSION`) from the tag — the same tag verify-plugin-version checks plugin.json
        # against, so the binary version == plugin version by construction. Gated on ref TYPE
        # (refs/tags/v*) so a workflow_dispatch run on a branch merely NAMED v-something leaves it unset
        # (the 0.0.0 dev fallback applies).
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export ZZOP_RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi
          cargo build -p zzop-mcp --release --target ${{ matrix.target }}
      - name: Collect zzop-mcp binary
        shell: bash
        run: |
          mkdir -p dist-mcp
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release/zzop-mcp.exe" "dist-mcp/zzop-mcp-${{ matrix.platform }}.exe" ;;
            *)         cp "target/${{ matrix.target }}/release/zzop-mcp" "dist-mcp/zzop-mcp-${{ matrix.platform }}" ;;
          esac
          ls -la dist-mcp
      - uses: actions/upload-artifact@v4
        with:
          name: zzop-mcp-${{ matrix.target }}
          path: dist-mcp/*

  # Only runs on a `v*` tag push. The Claude Code plugin marketplace reads
  # `.claude-plugin/plugin.json`'s "version" straight from the repo at the tagged commit (no
  # tag-stamping step), so a forgotten bump would silently ship a stale plugin version forever. This
  # job fails the whole run before `release` does anything if the committed version and the tag
  # disagree. `.claude-plugin/marketplace.json` carries no "version" field today (checked here so this
  # job starts failing loudly the day one is added without being wired into this check).
  verify-plugin-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .claude-plugin/plugin.json version matches the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::.claude-plugin/plugin.json version ($PLUGIN_VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG_VERSION) — bump .claude-plugin/plugin.json's \"version\" in the same commit as the release tag."
            exit 1
          fi
          echo ".claude-plugin/plugin.json version ($PLUGIN_VERSION) matches tag $GITHUB_REF_NAME."
          if jq -e 'has("version")' .claude-plugin/marketplace.json >/dev/null; then
            MARKETPLACE_VERSION=$(jq -r '.version' .claude-plugin/marketplace.json)
            if [ "$MARKETPLACE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::.claude-plugin/marketplace.json version ($MARKETPLACE_VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG_VERSION)."
              exit 1
            fi
            echo ".claude-plugin/marketplace.json version ($MARKETPLACE_VERSION) matches tag $GITHUB_REF_NAME."
          fi

  # Only runs on a `v*` tag push (the build matrix above also runs for workflow_dispatch, without
  # releasing). Attaches the 5 bare `zzop-mcp-<platform>[.exe]` binaries (PATH install / Claude Code
  # plugin) AND 5 per-platform `zzop-<platform>.mcpb` one-click Desktop bundles to the GitHub release.
  release:
    needs: [build, verify-plugin-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
      - name: Download zzop-mcp binaries
        uses: actions/download-artifact@v4
        with:
          pattern: zzop-mcp-*
          path: mcp-artifacts
          merge-multiple: true
      - name: Build per-platform MCPB bundles
        # One `.mcpb` per platform (all on ubuntu, where jq/zip/npx are available — avoids the
        # cross-platform zip problem): stage that platform's binary at bin/zzop-mcp[.exe], stamp the
        # manifest version from the tag, validate against the MCPB schema, and zip. See packaging/README.md.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version=$v' packaging/mcpb/manifest.json > manifest.stamped.json
          npx -y @anthropic-ai/mcpb@latest validate manifest.stamped.json
          for f in mcp-artifacts/zzop-mcp-*; do
            base=$(basename "$f")                       # zzop-mcp-<platform>[.exe]
            plat=${base#zzop-mcp-}; plat=${plat%.exe}   # <platform>
            rm -rf out && mkdir -p out/bin
            case "$base" in
              *.exe) cp "$f" out/bin/zzop-mcp.exe ;;
              *)     cp "$f" out/bin/zzop-mcp && chmod +x out/bin/zzop-mcp ;;
            esac
            cp manifest.stamped.json out/manifest.json
            (cd out && zip -r "../zzop-$plat.mcpb" manifest.json bin)
          done
          ls -la ./*.mcpb
      - name: Upload zzop-mcp binaries + MCPB bundles to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" mcp-artifacts/* ./*.mcpb --clobber
