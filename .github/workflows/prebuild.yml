# Prebuild matrix for the N-API addon (napi-rs optionalDependencies pattern — DESIGN.md decision #6).
# On a `v*` tag push, also publishes the 5 platform sub-packages, the main @zzop/native package, and
# the `zzop` CLI to npm via OIDC "trusted publishing" (no NPM_TOKEN secret) — requires each of the 7
# packages to have a trusted publisher configured on npmjs.com for this repo + this workflow file. See
# packages/native/README.md's "Publishing" section for the one-time npmjs.com setup.
name: prebuild

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # `platform` is the npm/<platform> sub-package name for the target (napi-rs/swc/Prisma
        # convention, same mapping as packages/native/scripts/place-artifacts.mjs) — used to name
        # the zzop-mcp release assets.
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32-x64-msvc
          # Intel macOS: cross-compiled from the Apple Silicon runner (Intel `macos-13` runners are
          # scarce/deprecated). Same lane as linux-arm64 below — a secondary arch built on the primary
          # runner; smoke test is skipped for cross targets.
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: "true"
            platform: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: "true"
            platform: linux-arm64-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compile linker (linux-arm64)
        # linux-arm64 alone needs a cross-linker; the darwin-x64 cross target builds with the universal
        # Apple SDK on the arm64 runner and needs no extra linker.
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - name: Build addon
        # On a `v*` tag, stamp the addon's reported version (`version()`'s `zzop-napi/<version>`
        # segment, compile-time `ZZOP_RELEASE_VERSION`) from the tag — the same source the publish
        # job's sync-versions.mjs stamps into the npm packages, so the addon's reported version ==
        # @zzop/native version by construction (same gate/export as the zzop-mcp step below).
        # Gated on ref TYPE (refs/tags/v*), matching the publish job's startsWith gate — a
        # workflow_dispatch run on a branch merely NAMED v-something must not stamp a bogus
        # version; non-tag runs leave it unset so the 0.0.0 dev fallback applies.
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export ZZOP_RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi
          cargo build -p zzop-napi --release --features addon --target ${{ matrix.target }}
      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release/zzop_napi.dll" "dist/zzop-napi.${{ matrix.target }}.node" ;;
            *apple*)   cp "target/${{ matrix.target }}/release/libzzop_napi.dylib" "dist/zzop-napi.${{ matrix.target }}.node" ;;
            *)         cp "target/${{ matrix.target }}/release/libzzop_napi.so" "dist/zzop-napi.${{ matrix.target }}.node" ;;
          esac
          ls -la dist
      - name: Smoke test (native targets only)
        if: matrix.cross != 'true'
        shell: bash
        run: |
          cp "dist/zzop-napi.${{ matrix.target }}.node" packages/native/zzop-napi.node
          node packages/native/smoke.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: zzop-napi-${{ matrix.target }}
          path: dist/*.node
      # The Node-free standalone binary (packages/mcp) — same target as the addon build above; it
      # depends only on the same pure-workspace crates the addon already cross-compiles, so every
      # lane (including the two cross ones) works with no extra toolchain setup.
      - name: Build zzop-mcp binary
        # On a `v*` tag, stamp the binary's reported version (MCP serverInfo.version, compile-time
        # `ZZOP_RELEASE_VERSION`) from the tag — the same source the publish job's sync-versions.mjs
        # stamps into the npm packages, so binary version == @zzop/cli version by construction.
        # Gated on ref TYPE (refs/tags/v*), matching the publish job's startsWith gate — a
        # workflow_dispatch run on a branch merely NAMED v-something must not stamp a bogus
        # version; non-tag runs leave it unset so the 0.0.0 dev fallback applies.
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export ZZOP_RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi
          cargo build -p zzop-mcp --release --target ${{ matrix.target }}
      - name: Collect zzop-mcp binary
        shell: bash
        run: |
          mkdir -p dist-mcp
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release/zzop-mcp.exe" "dist-mcp/zzop-mcp-${{ matrix.platform }}.exe" ;;
            *)         cp "target/${{ matrix.target }}/release/zzop-mcp" "dist-mcp/zzop-mcp-${{ matrix.platform }}" ;;
          esac
          ls -la dist-mcp
      - uses: actions/upload-artifact@v4
        with:
          name: zzop-mcp-${{ matrix.target }}
          path: dist-mcp/*

  # Only runs on a `v*` tag push (job-level `if`, same gate as `publish` below). Unlike every npm
  # package version (overwritten from the tag at publish time by the step below), the Claude Code
  # plugin marketplace reads `.claude-plugin/plugin.json`'s "version" straight from the repo at
  # whatever commit the tag points at — there is no sync-versions.mjs-style stamping step for it, so
  # a forgotten bump would silently ship a stale plugin version forever. This job makes that mistake
  # impossible: it fails the whole run before `publish` does anything if the committed version and
  # the tag disagree. `.claude-plugin/marketplace.json` carries no "version" field today (checked
  # here so this job starts failing loudly the day one is added without being wired into this check).
  verify-plugin-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .claude-plugin/plugin.json version matches the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::.claude-plugin/plugin.json version ($PLUGIN_VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG_VERSION) — bump .claude-plugin/plugin.json's \"version\" in the same commit as the release tag."
            exit 1
          fi
          echo ".claude-plugin/plugin.json version ($PLUGIN_VERSION) matches tag $GITHUB_REF_NAME."
          if jq -e 'has("version")' .claude-plugin/marketplace.json >/dev/null; then
            MARKETPLACE_VERSION=$(jq -r '.version' .claude-plugin/marketplace.json)
            if [ "$MARKETPLACE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::.claude-plugin/marketplace.json version ($MARKETPLACE_VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG_VERSION)."
              exit 1
            fi
            echo ".claude-plugin/marketplace.json version ($MARKETPLACE_VERSION) matches tag $GITHUB_REF_NAME."
          fi

  # Only runs on a `v*` tag push (job-level `if`, since the build matrix above must also run for
  # workflow_dispatch without publishing). The git tag is the single source of truth for the
  # published version: this job overwrites every package.json's committed version with the tag's,
  # so there is no separate "bump packages/native/package.json before tagging" step to forget.
  #
  # Publishes via npm OIDC "trusted publishing" — no NPM_TOKEN secret. Each of the 7 package names
  # (@zzop/native + the 5 platform sub-packages + the `zzop` CLI) must have a trusted publisher
  # configured on npmjs.com pointing at this repo and this workflow file (packages/native/README.md
  # "Publishing").
  publish:
    needs: [build, verify-plugin-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm (OIDC trusted publishing needs a recent npm CLI)
        # Pinned to the 11.x line: npm@12.0.0 (published 2026-07-08) ships a broken
        # `--provenance` path — `Cannot find module 'sigstore'` inside its own bundled
        # libnpmpublish — which failed the v0.7.0 publish twice (run 29057344845, retry
        # included). `@latest` floated onto that major the day after v0.6.0 shipped.
        # Re-evaluate the pin once a fixed 12.x is out.
        run: npm install -g npm@11
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zzop-napi-*
          path: artifacts
          merge-multiple: true
      - name: Set version from tag (overwrites committed version everywhere)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd packages/native && npm version --no-git-tag-version "$VERSION")
          node packages/native/scripts/sync-versions.mjs
          # CLI package (`zzop`): bump its version and pin its @zzop/native dependency to this same
          # release, so `npm i zzop` always pulls the matching engine build.
          (cd packages/cli && npm version --no-git-tag-version "$VERSION" && npm pkg set "dependencies.@zzop/native=$VERSION")
      - name: Place prebuilt binaries into platform packages
        run: node packages/native/scripts/place-artifacts.mjs artifacts
      - name: Publish platform packages
        run: |
          for dir in packages/native/npm/*/; do
            (cd "$dir" && npm publish --provenance)
          done
      - name: Publish main package
        run: (cd packages/native && npm publish --provenance)
      - name: Publish CLI (`zzop`)
        run: (cd packages/cli && npm publish --provenance)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
      # Standalone zzop-mcp binaries (built per-target by the matrix above) attach to the release as
      # `zzop-mcp-<platform>[.exe]` assets — the Node-free install path (packages/mcp/README.md).
      - name: Download zzop-mcp binaries
        uses: actions/download-artifact@v4
        with:
          pattern: zzop-mcp-*
          path: mcp-artifacts
          merge-multiple: true
      - name: Upload zzop-mcp binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" mcp-artifacts/* --clobber
