[package]
name = "zzop-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The `zzop-mcp` product: the MCP server over stdio (newline-delimited JSON-RPC 2.0) — `initialize`,
# `tools/*` (schemas in `src/tools/definitions.rs`, dispatch in `src/tools.rs`), `resources/*` (the
# embedded authoring contracts, via the shared `zzop-host` crate's `embedded` module). A thin lib +
# bin split (like the former `zzop-host` crate) so `src/tests/*` unit tests AND external integration
# tests (`tests/surface_prose.rs`, reading this crate's `tools::list()` as a library call) both work.
# THIS CRATE IS ALSO A THIN PROTOCOL FACADE: no shaping/filter/summary logic lives here — every
# `tools/call` handler extracts its arguments (`zzop_summary::args`) and calls the shared
# `zzop-summary` crate, exactly like the `zzop` CLI (package `zzop-cli-bin`) does through
# `zzop-host`'s own `tools.rs`, so a CLI query and an MCP tool call give the identical answer.
[lib]
name = "zzop_mcp"
path = "src/lib.rs"

[[bin]]
name = "zzop-mcp"
path = "src/bin/zzop-mcp.rs"

[dependencies]
zzop-host = { path = "../../crates/host" }
zzop-summary = { path = "../../crates/summary" }
zzop-config = { path = "../../crates/config" }
serde_json = { workspace = true }
