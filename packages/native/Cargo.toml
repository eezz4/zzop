[package]
name = "zzop-napi"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
build = "build.rs"

# `cdylib` is the Node addon artifact; `rlib` keeps this crate usable as an ordinary Rust dependency (and is
# what `cargo test` actually links against — see `src/lib.rs`'s module doc for why the `cdylib` half is safe
# to always declare even though the *addon* half is feature-gated).
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The actual analyze/analyzeTrees/version logic — see `src/lib.rs`'s module doc for why it lives in a
# separate rlib crate instead of here.
zzop-facade = { path = "../../crates/facade" }

# Optional, gathered under the `addon` feature (default OFF) — see `src/lib.rs`'s module doc.
napi = { version = "2.16", features = ["serde-json"], optional = true }
napi-derive = { version = "2.16", optional = true }

[build-dependencies]
napi-build = { version = "2.3", optional = true }

[features]
default = []
# Turns on the real `#[napi]`-exported surface (`src/addon.rs`) plus `napi-build`'s MSVC delay-load linker
# setup. Build the addon with:
#   cargo +stable-x86_64-pc-windows-msvc build -p zzop-napi --release --features addon
addon = ["dep:napi", "dep:napi-derive", "dep:napi-build"]
