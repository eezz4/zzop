[workspace]
resolver = "2"
members = [
  # Engine (native, always built)
  "packages/core",
  "packages/metrics",
  "packages/engine",
  "packages/git",
  "packages/cache",
  "packages/napi",

  # Parser frontends (former lang/ + dsl/, merged) — source -> Normalized AST / Common IR
  "parser/parser-typescript",
  "parser/parser-prisma",
  "parser/parser-java",

  # Python/JSP support arrives via the external-parser envelope protocol (docs/NORMALIZED_AST.md),
  # not an in-workspace crate — no placeholder crate needed (see parser/README.md).

  # Native rules — whole-graph, statically linked into core
  "rules/native/rules-graph",
  "rules/native/rules-http",
  "rules/native/rules-cross-layer",
  "rules/native/rules-schema",

  # Language/environment rule packs are declarative DSL data (rules/dsl/<pack>/<pack>.json), not crates —
  # the engine interprets them (WASM approach dropped). "rules" below is a thin test-only crate that gives
  # each pack's co-located <pack>.rs a cargo test target; it carries no rule data or interpreter logic.
  "rules",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT"

# Pin shared dependency versions here. swc version isolation: swc dependencies are pinned here and
# confined to parser-typescript, so an upgrade's re-verification scope is one crate, not the whole
# workspace.
[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
rayon = "1"
